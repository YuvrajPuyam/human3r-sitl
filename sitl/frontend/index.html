<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SITL — Semantic Interaction Topology Lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      background: #0d0d0d;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    input[type="range"] { accent-color: #3b82f6; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  </style>

  <!--
    Three.js r134 — last version with examples/js global scripts
    These extend the THREE namespace, so load order matters:
      1. three.min.js    (sets window.THREE)
      2. OrbitControls   (adds THREE.OrbitControls)
      3. PLYLoader       (adds THREE.PLYLoader)
  -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/PLYLoader.js"></script>

  <!-- React 18 UMD (sets window.React + window.ReactDOM) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel standalone — transforms type="text/babel" scripts in DOM order -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Load order: Viewer.jsx first so window.Viewer is defined before App.jsx runs.
    Babel processes these sequentially, so execution order is guaranteed.
  -->
  <script type="text/babel" src="/frontend/Viewer.jsx?v=12"></script>
  <script type="text/babel" src="/frontend/App.jsx?v=6"></script>
</body>
</html>
