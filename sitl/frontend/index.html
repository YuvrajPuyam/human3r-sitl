<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BodyPlot — Case File Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      background: #09090b;
      color: #fafaf9;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    input[type="range"] { accent-color: #d97706; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3c3836; border-radius: 2px; }
  </style>

  <!--
    Three.js r134 — last version with examples/js global scripts
    These extend the THREE namespace, so load order matters:
      1. three.min.js    (sets window.THREE)
      2. OrbitControls   (adds THREE.OrbitControls)
      3. PLYLoader       (adds THREE.PLYLoader)
  -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/PLYLoader.js"></script>

  <!-- React 18 UMD (sets window.React + window.ReactDOM) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel standalone — transforms type="text/babel" scripts in DOM order.
       Pinned to v7: Babel 8 defaults @babel/preset-react to the automatic JSX
       runtime, which injects `import {jsx} from "react/jsx-runtime"` into the
       output. Run as a plain script that throws "Cannot use import statement
       outside a module" and blanks the page. v7 defaults to the classic
       React.createElement runtime — no imports emitted. -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Load order: Viewer.jsx first so window.Viewer is defined before App.jsx runs.
    Babel processes these sequentially, so execution order is guaranteed.
  -->
  <script type="text/babel" src="/frontend/Viewer.jsx?v=20"></script>
  <script type="text/babel" src="/frontend/App.jsx?v=10"></script>
</body>
</html>
